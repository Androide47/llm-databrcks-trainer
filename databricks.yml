# This is a Databricks asset bundle definition for llm-databrcks-trainer.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: llm-databrcks-trainer

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-d4d39d56-a691.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-d4d39d56-a691.cloud.databricks.com

resources:
  pipelines:
    llm_curation_pipeline:
      name: "LLM Data Curation Pipeline"
      catalog: llm_curation
      schema: bronze
      serverless: true
      libraries:
        - file:
            path: ./src/01_ingestion.py
      development: true
      continuous: false

  jobs:
      curation_workflow:
        name: "LLM Curation Workflow"
        tasks:
          - task_key: run_dlt_pipeline
            pipeline_task:
              pipeline_id: ${resources.pipelines.llm_curation_pipeline.id}