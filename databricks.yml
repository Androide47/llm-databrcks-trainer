# This is a Databricks asset bundle definition for llm-databrcks-trainer.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: llm-databrcks-trainer

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-d4d39d56-a691.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-d4d39d56-a691.cloud.databricks.com

resources:
  pipelines:
    pipeline_bronze:
      name: "LLM_Pipeline_Bronze"
      catalog: llm_curation
      schema: bronze
      serverless: true
      libraries:
        - file:
            path: ./src/01_ingestion.py

    pipeline_silver:
        name: "LLM_Pipeline_Silver"
        catalog: llm_curation
        schema: silver
        environment:
          dependencies:
            - detoxify==0.1.1

        serverless: true
        libraries:
          - file:
              path: ./src/02_cleaning.py
    pipeline_gold:
        name: "LLM_Pipeline_Gold"
        catalog: llm_curation
        schema: gold
        environment:
          dependencies:
            - langchain_text_splitters
            - tiktoken==0.8.0
        serverless: true
        libraries:
          - file:
              path: ./src/03_chunking.py


jobs:
    curation_workflow:
      name: "LLM Curation Workflow"
      tasks:
        - task_key: bronze_layer
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_bronze.id}
        - task_key: silver_layer
          depends_on:
            - task_key: bronze_layer
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_silver.id}
        - task_key: gold_layer
          depends_on:
            - task_key: silver_layer
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_gold.id}