# This is a Databricks asset bundle definition for llm-databrcks-trainer.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: llm-databrcks-trainer

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-d4d39d56-a691.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-d4d39d56-a691.cloud.databricks.com

resources:
  jobs:
    curation_pipeline_job:
      name: "LLM Curation Pipeline"
      tasks:
        - task_key: ingest_raw_data
          notebook_task:
            notebook_path: ./src/1_ingestion.py